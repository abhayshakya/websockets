<!DOCTYPE html>
<html>
<head>
  <title>Chat UI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      margin-top: 30px;
    }

    .container {
      width: 400px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      padding: 15px;
    }

    h2 {
      text-align: center;
    }

    .top-controls {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }

    input {
      flex: 1;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 8px 10px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    #chat {
      height: 350px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      max-width: 70%;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    .self {
      align-self: flex-end;
      background: #dcf8c6;
    }

    .other {
      align-self: flex-start;
      background: #eee;
    }

    .system {
      align-self: center;
      font-size: 12px;
      color: gray;
    }

    .private {
      background: #ffeeba;
      align-self: flex-start;
    }

    .bottom {
      display: flex;
      gap: 5px;
    }
  </style>

  <script>
  {
    // Check if user is logged in
    const cachedToken = localStorage.getItem("chatToken");
    const cachedUser = localStorage.getItem("chatUser");

    if (!cachedToken || !cachedUser) {
      // No login info → redirect to login page
      window.location.href = "login.html";
    }
  }
  </script>
</head>

<body>

<div class="container">
  <h2>💬 Chat</h2>

  <!-- <div class="top-controls">
    <input id="username" placeholder="Username">
    <button onclick="join()">Join</button>
  </div> -->

  <div class="top-controls">
    <input id="room" placeholder="Room">
    <button onclick="joinRoom()">Join Room</button>
  </div>

  <div id="chat"></div>

  <div class="bottom">
    <input id="message" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>
  
  <div class="logout">
    <button onclick="logout()">Logout</button>
  </div>

</div>

<script>
  function logout() {
  localStorage.removeItem("chatToken");
  localStorage.removeItem("chatUser");
  window.location.href = "login.html";
}
</script>

<script src="/chat/chatfront.js"></script>

</body>
</html>
